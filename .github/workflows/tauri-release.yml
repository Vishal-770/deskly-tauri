name: Tauri Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows
            bundle_glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/msi/*.sig
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.sig
          - os: ubuntu-22.04
            artifact_name: linux
            bundle_glob: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/appimage/*.AppImage.sig
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
          - os: macos-latest
            artifact_name: macos
            bundle_glob: |
              src-tauri/target/release/bundle/macos/*.app.tar.gz
              src-tauri/target/release/bundle/macos/*.sig
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/*/release/bundle/macos/*.app.tar.gz
              src-tauri/target/*/release/bundle/macos/*.sig
              src-tauri/target/*/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure signing secrets are present
        shell: bash
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required" >&2
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build signed Tauri bundles
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_glob }}
          if-no-files-found: error

  android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Android signing secrets are present
        shell: bash
        run: |
          for var in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "$var is required" >&2
              exit 1
            fi
          done
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          (yes || true) | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;30.0.14904198"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Android signing
        shell: bash
        run: |
          APP_DIR="src-tauri/gen/android/app"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$APP_DIR/keystore.jks"
          cat > "$APP_DIR/signing.properties" <<EOF
          storeFile=keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build signed Android package
        run: pnpm tauri android build

      - name: Sign Android artifacts
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="src-tauri/gen/android/app/build/outputs"
          APK_INPUT="$(find "$APP_DIR/apk" -name '*release-unsigned.apk' | sort | head -n 1)"
          AAB_INPUT="$(find "$APP_DIR/bundle" -name '*.aab' | sort | head -n 1)"
          BUILD_TOOLS_DIR="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"

          if [ -z "$APK_INPUT" ] || [ ! -f "$APK_INPUT" ]; then
            echo "Unsigned APK not found" >&2
            exit 1
          fi

          if [ -z "$AAB_INPUT" ] || [ ! -f "$AAB_INPUT" ]; then
            echo "AAB not found" >&2
            exit 1
          fi

          mkdir -p release-assets/android

          export PATH="$BUILD_TOOLS_DIR:$PATH"

          zipalign -p -f 4 "$APK_INPUT" release-assets/android/app-release-aligned.apk
          apksigner sign \
            --ks src-tauri/gen/android/app/keystore.jks \
            --ks-pass pass:"$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass pass:"$ANDROID_KEY_PASSWORD" \
            --out release-assets/android/app-release-signed.apk \
            release-assets/android/app-release-aligned.apk

          jarsigner \
            -keystore src-tauri/gen/android/app/keystore.jks \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            "$AAB_INPUT" \
            "$ANDROID_KEY_ALIAS"

          cp "$AAB_INPUT" release-assets/android/app-release-signed.aab

          apksigner verify --verbose release-assets/android/app-release-signed.apk
          jarsigner -verify -verbose -certs release-assets/android/app-release-signed.aab | tail -n 20

        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            release-assets/android/app-release-signed.apk
            release-assets/android/app-release-signed.aab
          if-no-files-found: error

  release:
    needs: [build, android]
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate latest.json
        run: |
          node scripts/generate-latest-json.mjs \
            --assetsDir release-assets \
            --repository "${GITHUB_REPOSITORY}" \
            --tag "${GITHUB_REF_NAME}" \
            --version "${GITHUB_REF_NAME#v}" \
            --notes "Release ${GITHUB_REF_NAME}" \
            --pubDate "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: List release assets
        run: |
          find release-assets -maxdepth 5 -type f | sort

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            release-assets/latest.json
            release-assets/**/*.msi
            release-assets/**/*.msi.sig
            release-assets/**/*.exe
            release-assets/**/*.exe.sig
            release-assets/**/*.AppImage
            release-assets/**/*.AppImage.sig
            release-assets/**/*.app.tar.gz
            release-assets/**/*.app.tar.gz.sig
            release-assets/**/*.dmg
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/android/**/*.apk
            release-assets/android/**/*.aab
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: false
