name: Android Release

on:
  push:
    tags:
      - "android-v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Android signing secrets are present
        shell: bash
        run: |
          for var in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "$var is required" >&2
              exit 1
            fi
          done
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          (yes || true) | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;30.0.14904198"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Android signing
        shell: bash
        run: |
          APP_DIR="src-tauri/gen/android/app"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$APP_DIR/keystore.jks"
          cat > "$APP_DIR/signing.properties" <<EOF
          storeFile=keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build Android package
        run: |
          pnpm tauri android build --apk
          pnpm tauri android build --aab

      - name: Sign Android artifacts
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="src-tauri/gen/android/app/build/outputs"
          BUILD_TOOLS_DIR="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          export PATH="$BUILD_TOOLS_DIR:$PATH"

          mkdir -p release-assets/android

          mapfile -t APK_FILES < <(find "$APP_DIR/apk" -type f \( -name '*.apk' \) ! -name '*unaligned*' ! -name '*-signed.apk')
          if [ ${#APK_FILES[@]} -eq 0 ]; then
            echo "No APKs found in $APP_DIR/apk" >&2
            exit 1
          fi

          for apk in "${APK_FILES[@]}"; do
            base_name="$(basename "$apk" .apk)"
            clean_name="${base_name%-unsigned}"
            clean_name="${clean_name%-release}"
            out_prefix="${clean_name/#app/deskly}"
            target_apk="release-assets/android/${out_prefix}.apk"
            zipalign -p -f 4 "$apk" "$target_apk"
            apksigner sign \
              --ks src-tauri/gen/android/app/keystore.jks \
              --ks-pass pass:"$ANDROID_KEYSTORE_PASSWORD" \
              --key-pass pass:"$ANDROID_KEY_PASSWORD" \
              "$target_apk"
            apksigner verify --verbose "$target_apk"
          done

          AAB_INPUT="$(find "$APP_DIR/bundle" -type f -name '*.aab' | sort | head -n 1 || true)"
          if [ -n "$AAB_INPUT" ] && [ -f "$AAB_INPUT" ]; then
            cp "$AAB_INPUT" release-assets/android/deskly.aab
            jarsigner -verify -verbose -certs release-assets/android/deskly.aab | tail -n 20 || true
          fi

        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: release-assets/android/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Android Release ${{ github.ref_name }}
          files: |
            release-assets/android/*.apk
            release-assets/android/*.aab
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: false
